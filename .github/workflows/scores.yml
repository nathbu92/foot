name: Score Updates

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  send-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests

      - name: Restaurer l'état
        uses: actions/cache@v4
        with:
          path: last_sent.json
          key: scores-state-v1
          restore-keys: scores-state-v1

      - name: Envoyer les scores
        run: python scores.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Sauvegarder l'état
        uses: actions/cache/save@v4
        with:
          path: last_sent.json
          key: scores-state-v1-${{ github.run_id }}
